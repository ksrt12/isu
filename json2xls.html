<!DOCTYPE html>
<html lang="ru">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="JSON2XLS">
<meta name="theme-color" content="#3367D6">
<style>
body { padding: 0; font-family: sans-serif; }
.license-text { background-color: #eeeeee; border-top: 20px solid white; padding: 10px; }
div * { display: flex; margin-bottom: 5px; }
button { width: fit-content; }
</style>
<link rel="apple-touch-icon" sizes="120x120" href="../icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="16x16" href="../icons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="../icons/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="128x128" href="../icons/favicon-128x128.png">

<script src="akt.user.js"></script>
<script src="js/json2xls.js"></script>
<title>JSON2XLS</title>
</head>

<body>
	<p class="license-text">Объединение JSON-файлов и конвертация в XLS</p>
	<div id="main" style="flex-direction: column;">
		<input id="source" type="file" multiple accept="application/json" onchange="load_files()">
		<div id="first">
			<button id="merge" style="display:none" onclick="mergeJSONs()">MERGE</button>
		</div>
		<div id="second" style="display:none">
			<button id="convert" onclick="do_json2xls()">JSON2XLS</button>
		</div>
	</div>
</body>

</html>
